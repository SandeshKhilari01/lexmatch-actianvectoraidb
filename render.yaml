services:
  - type: web
    name: lexmatch-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGINS
        sync: false
        placeholder: "https://your-frontend.vercel.app"
      - key: VECTORAI_DB_URL
        sync: false
      - key: VECTORAI_API_KEY
        sync: false
